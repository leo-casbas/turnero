  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia de Turno - Leo Casbas</title>
    <style>
        :root { --primary: #2e7d32; --accent: #c8e6c9; --text: #333; --bg: #f5f5f5; }
        body { font-family: sans-serif; margin: 0; padding: 0; background: var(--bg); text-align: center; }
        header { background: var(--primary); color: white; padding: 1rem; }
        .container { max-width: 500px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .farmacia-box { border: 2px solid var(--accent); padding: 1rem; border-radius: 8px; margin: 1rem 0; }
        
        /* Mantenemos tu estructura de estilos exacta */
        #nombre-farmacia { font-size: 1.4rem; font-weight: bold; display: block; }
        #direccion-farmacia { display: block; margin-top: 5px; color: #666; }
        
        .admin-panel { margin-top: 2rem; border-top: 1px solid #ddd; padding-top: 1rem; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1b5e20; }
    </style>
</head>
<body>
    <header><h1>Farmacia de Turno</h1></header>
    <div class="container">
        <h2>Hoy de Turno:</h2>
        <div class="farmacia-box">
            <span id="nombre-farmacia">Cargando...</span>
            <span id="direccion-farmacia">Conectando al servidor...</span>
        </div>
        
        <div class="admin-panel">
            <h3>Actualizar Turno (Admin)</h3>
            <input type="text" id="nuevo-nombre" placeholder="Nombre de Farmacia">
            <input type="text" id="nueva-direccion" placeholder="Dirección">
            <button id="btn-actualizar" onclick="actualizar()">Guardar en Servidor</button>
        </div>
    </div>

    <script>
        // URL de tu Google Apps Script ya integrada
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx9yeA_Tf-eD5ywAEQvS9LsY7vAQC7gJPxqiIAZf6ygJu1hG0LQHIFjeAoTyHnP-s4x/exec";

        // Función para leer los datos de Google Sheets
        async function cargar() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                if(data && data.length > 0) {
                    // El primer elemento del array es la farmacia actual
                    document.getElementById('nombre-farmacia').innerText = data[0].Nombre;
                    document.getElementById('direccion-farmacia').innerText = data[0].Dirección;
                } else {
                    document.getElementById('nombre-farmacia').innerText = "Sin turnos";
                    document.getElementById('direccion-farmacia').innerText = "La lista está vacía";
                }
            } catch(e) { 
                console.error("Error al cargar", e); 
                document.getElementById('nombre-farmacia').innerText = "Error de conexión";
            }
        }

        // Función para enviar los datos a Google Sheets
        async function actualizar() {
            const n = document.getElementById('nuevo-nombre').value;
            const d = document.getElementById('nueva-direccion').value;
            const btn = document.getElementById('btn-actualizar');

            if(!n || !d) return alert("Por favor, completa nombre y dirección");
            
            // Bloqueamos el botón visualmente para evitar doble clic
            btn.innerText = "Guardando...";
            btn.style.opacity = "0.5";
            btn.disabled = true;

            const data = [{"Nombre": n, "Dirección": d, "Teléfono": "-"}];
            
            try {
                // Enviamos los datos como POST
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para Google Apps Script
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                alert("¡Orden guardado! Los cambios aparecerán en unos segundos.");
                
                // Limpiar campos y refrescar
                document.getElementById('nuevo-nombre').value = "";
                document.getElementById('nueva-direccion').value = "";
                setTimeout(cargar, 2000); // Recarga la vista tras 2 segundos
                
            } catch(e) { 
                alert("Error al guardar en el servidor");
                console.error(e);
            } finally {
                btn.innerText = "Guardar en Servidor";
                btn.style.opacity = "1";
                btn.disabled = false;
            }
        }

        // Ejecutar carga al abrir la web
        window.onload = cargar;
    </script>
</body>
</html>
