<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmacia de Turno</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to right, #f1f8e9, #e3f2fd);
      color: #333;
    }
    header {
      background: #66bb6a;
      color: white;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    nav a {
      color: white;
      margin: 0 1rem;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.3s;
    }
    nav a:hover { color: #c8e6c9; }
    section { padding: 2rem; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
      max-width: 700px;
      margin: auto;
      text-align: center;
      transition: transform 0.3s;
    }
    .card:hover { transform: scale(1.02); }
    h1, h2 { color: #388e3c; }
    h1 { font-size: 2.2rem; }
    h2 { font-size: 1.6rem; margin-bottom: 1rem; }
    p { font-size: 1.3rem; font-weight: bold; color: #0277bd; }
    img.cruz { width: 100px; margin-bottom: 1rem; }
    input, button, select {
      padding: 0.8rem;
      margin: 0.5rem 0;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    button {
      background: #66bb6a;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
      border: none;
    }
    button:hover { background: #43a047; }
    footer {
      background: #66bb6a;
      color: white;
      text-align: center;
      padding: 1rem;
      margin-top: 2rem;
      font-size: 0.9rem;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Farmacia de Turno</h1>
    <nav>
      <a onclick="mostrarSeccion('home')">Home</a>
      <a onclick="loginAdmin()">Administrador</a>
    </nav>
  </header>

  <section id="home">
    <div class="card">
      <img src="https://rioceballos.tur.ar/wp-content/uploads/2025/11/farmacia-05-2-768x465.png" alt="Cruz verde farmacia" class="cruz">
      <h2>Farmacia en Turno Hoy</h2>
      <p id="farmacia-turno">Cargando...</p>
    </div>
  </section>

  <section id="admin" class="hidden">
    <div class="card">
      <h2>Panel Administrador</h2>
      <p>Modifica el orden de los turnos:</p>
      <div id="orden-farmacias"></div>
      <button id="btn-guardar" onclick="guardarOrden()">Guardar Orden</button>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Farmacias de Turno</p>
  </footer>

  <script>
    // URL DE TU GOOGLE APPS SCRIPT
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx9yeA_Tf-eD5ywAEQvS9LsY7vAQC7gJPxqiIAZf6ygJu1hG0LQHIFjeAoTyHnP-s4x/exec";
    
    // Lista inicial (se actualizará con lo que haya en el servidor)
    let farmacias = ["Farmacia Zuloaga", "Farmacia Trecco", "Farmacia Martinez", "Farmacia Rola"];
    const claveAdmin = "1234";

    function mostrarSeccion(seccion) {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('admin').classList.add('hidden');
      document.getElementById(seccion).classList.remove('hidden');
    }

    function loginAdmin() {
      const clave = prompt("Ingrese la clave de administrador:");
      if (clave === claveAdmin) {
        mostrarSeccion('admin');
        mostrarOrdenAdmin();
      } else {
        alert("Clave incorrecta");
      }
    }

    // CARGAR DATOS DESDE GOOGLE SHEETS
    async function cargarDatos() {
      try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        if (data.length > 0) {
          // Extraemos solo los nombres de la columna 'Nombre' del Excel
          farmacias = data.map(item => item.Nombre);
        }
        calcularTurno();
      } catch (e) {
        console.error("Error cargando datos:", e);
        calcularTurno(); // Si falla, usa la lista por defecto
      }
    }

    function calcularTurno() {
      const hoy = new Date();
      let dia = hoy.getDay(); 
      const hora = hoy.getHours();

      if (hora < 8) {
        dia = (dia - 1 + 7) % 7;
      }

      let indice;
      if (dia === 5 || dia === 6 || dia === 0) {
        indice = farmacias.length - 1; // Última farmacia del orden
      } else {
        indice = (dia - 1) % farmacias.length; 
      }

      document.getElementById("farmacia-turno").textContent = farmacias[indice] || "No definida";
    }

    function mostrarOrdenAdmin() {
      const contenedor = document.getElementById("orden-farmacias");
      contenedor.innerHTML = "";
      farmacias.forEach((farmacia, i) => {
        contenedor.innerHTML += `
          <div style="margin-bottom:10px;">
            <label>Posición ${i+1}:</label>
            <select id="select-${i}">
              ${farmacias.map(f => `<option value="${f}" ${f===farmacia?"selected":""}>${f}</option>`).join("")}
            </select>
          </div>
        `;
      });
    }

    // GUARDAR EN GOOGLE SHEETS
    async function guardarOrden() {
      const btn = document.getElementById("btn-guardar");
      const nuevoOrden = [];
      for (let i=0; i<farmacias.length; i++) {
        nuevoOrden.push({ "Nombre": document.getElementById(`select-${i}`).value, "Dirección": "-", "Teléfono": "-" });
      }

      btn.innerText = "Guardando...";
      btn.disabled = true;

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(nuevoOrden)
        });
        
        alert("Orden guardado en el servidor correctamente");
        farmacias = nuevoOrden.map(f => f.Nombre);
        calcularTurno();
        mostrarSeccion('home');
      } catch (e) {
        alert("Error al conectar con el servidor");
      } finally {
        btn.innerText = "Guardar Orden";
        btn.disabled = false;
      }
    }

    // Inicialización al cargar la página
    window.onload = cargarDatos;
  </script>
</body>
</html>
